services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      PORT: 4001
      MONGODB_URI: mongodb://mongo:27017/project_platform
      JWT_SECRET: change-me-in-production
      USER_SERVICE_URL: http://user-service:4003
    ports:
      - "4001:4001"
    depends_on:
      - mongo

  task-service:
    build:
      context: .
      dockerfile: services/task-service/Dockerfile
    environment:
      PORT: 4002
      MONGODB_URI: mongodb://mongo:27017/project_platform
      JWT_SECRET: change-me-in-production
    ports:
      - "4002:4002"
    depends_on:
      - mongo

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    environment:
      PORT: 4003
      MONGODB_URI: mongodb://mongo:27017/project_platform
      JWT_SECRET: change-me-in-production
    ports:
      - "4003:4003"
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - auth-service
      - task-service
      - user-service

volumes:
  mongo-data:
